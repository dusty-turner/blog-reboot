[build]
  command = ""
  publish = "public"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false

[context.production.environment]
  HUGO_ENV = "production"

# Redirect pkgdown directories to trailing slash so relative paths resolve correctly
[[redirects]]
  from = "/ggfunction"
  to = "/ggfunction/"
  status = 301
  force = true

[[redirects]]
  from = "/ggvfields"
  to = "/ggvfields/"
  status = 301
  force = true
