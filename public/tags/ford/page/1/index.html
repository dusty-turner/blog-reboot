<!DOCTYPE html>
<html lang="en">
  <head>
    <title>https://www.dustysturner.com/tags/ford/</title>
    <link rel="canonical" href="https://www.dustysturner.com/tags/ford/">
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=https://www.dustysturner.com/tags/ford/">
  </head>
<script>
(function() {
  var API_URL = "https://dustypi.tail280d22.ts.net/pageview/api/hit";

  function getVisitorId() {
    var match = document.cookie.match(/(?:^|; )_pvid=([^;]+)/);
    if (match) return match[1];
    var id = 'v_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    document.cookie = "_pvid=" + id + "; path=/; max-age=31536000; SameSite=Lax";
    return id;
  }

  function sendHit(publicIp) {
    try {
      var data = {
        page: window.location.pathname,
        url: window.location.href,
        referrer: document.referrer || null,
        title: document.title || null,
        screen_width: screen.width,
        screen_height: screen.height,
        user_agent: navigator.userAgent,
        language: navigator.language,
        timestamp: new Date().toISOString(),
        visitor_id: getVisitorId(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || null,
        connection_type: (navigator.connection && navigator.connection.effectiveType) || null,
        public_ip: publicIp || null
      };

      if (navigator.sendBeacon) {
        navigator.sendBeacon(API_URL, JSON.stringify(data));
      } else {
        fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
          keepalive: true
        }).catch(function() {});
      }
    } catch(e) {}
  }

  // Check localStorage cache first (refreshed daily)
  function getCachedIp() {
    try {
      var cached = JSON.parse(localStorage.getItem('_pvip') || '{}');
      if (cached.ip && cached.ts && (Date.now() - cached.ts) < 86400000) return cached.ip;
    } catch(e) {}
    return null;
  }

  function cacheIp(ip) {
    try { localStorage.setItem('_pvip', JSON.stringify({ ip: ip, ts: Date.now() })); } catch(e) {}
  }

  var cachedIp = getCachedIp();
  if (cachedIp) {
    sendHit(cachedIp);
    return;
  }

  // Try multiple IP services, use whichever responds first
  var sent = false;
  var timer = setTimeout(function() { if (!sent) { sent = true; sendHit(null); } }, 3000);

  function tryService(url, extract) {
    fetch(url).then(function(r) { return r.json(); }).then(function(d) {
      var ip = extract(d);
      if (!sent && ip) { sent = true; clearTimeout(timer); cacheIp(ip); sendHit(ip); }
    }).catch(function() {});
  }

  tryService("https://api.ipify.org?format=json", function(d) { return d.ip; });
  tryService("https://api.seeip.org/jsonip", function(d) { return d.ip; });
})();
</script>
</html>
